services:
  - type: web
    name: qea-utilization
    env: python
    region: singapore   # change to: oregon, frankfurt, ohio, virginia as needed
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py "utilization_report_generator.web:app"
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
